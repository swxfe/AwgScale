name: Tailscale
options:
  bundleIdPrefix: top.yesican
  deploymentTarget:
    iOS: "15.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""

targets:
  Tailscale:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Shared
    dependencies:
      - target: PacketTunnel
        embed: true
        codeSign: true
      # The app process uses Libtailscale for login before the VPN tunnel is enabled.
      - framework: Libtailscale.xcframework
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: top.yesican.tailscale
        INFOPLIST_FILE: App/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/Tailscale.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: App/Tailscale.entitlements
      properties:
        com.apple.security.application-groups:
          - group.top.yesican.tailscale
        keychain-access-groups:
          - $(AppIdentifierPrefix)top.yesican.tailscale.shared
        com.apple.developer.networking.networkextension:
          - packet-tunnel-provider

  PacketTunnel:
    type: app-extension
    platform: iOS
    sources:
      - path: PacketTunnel
      - path: Shared
    dependencies:
      # Libtailscale.xcframework is produced by build_go.sh (gomobile bind).
      # Run `./build_go.sh` before `xcodegen generate`.
      # Without this framework, Swift code falls back to stubs via #if canImport(Libtailscale).
      - framework: Libtailscale.xcframework
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: top.yesican.tailscale.network-extension
        INFOPLIST_FILE: PacketTunnel/Info.plist
        CODE_SIGN_ENTITLEMENTS: PacketTunnel/PacketTunnel.entitlements
    entitlements:
      path: PacketTunnel/PacketTunnel.entitlements
      properties:
        com.apple.security.application-groups:
          - group.top.yesican.tailscale
        keychain-access-groups:
          - $(AppIdentifierPrefix)top.yesican.tailscale.shared
        com.apple.developer.networking.networkextension:
          - packet-tunnel-provider

  TailscaleTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
      - path: Shared
    dependencies:
      - target: Tailscale
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: top.yesican.tailscale.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Tailscale:
    build:
      targets:
        Tailscale: all
        PacketTunnel: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - TailscaleTests
